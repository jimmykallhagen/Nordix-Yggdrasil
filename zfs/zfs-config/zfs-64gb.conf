###############################################################################
#                                                                             #
#                 Nordix - ZFS Performance Configuration                      #
#                                                                             #
#  File:      /etc/modprobe.d/zfs.conf                                        #
#  Purpose:   Kernel module parameters for the OpenZFS driver                 #
#  Profile:   High-performance desktop – 64 GB RAM – NVMe/SSD                 #
#                                                                             #
#  ZFS uses the Adaptive Replacement Cache (ARC), a sophisticated in-memory   #
#  read cache that combines recency and frequency heuristics to achieve       #
#  significantly higher hit rates than a traditional LRU cache. On a well-    #
#  tuned system, the vast majority of disk reads are served directly from     #
#  RAM. ARC tuning is the single most impactful thing you can do for ZFS      #
#  performance.                                                               #
#                                                                             #
#  After making changes you must either:                                      #
#    1. Reboot the system, OR                                                 #
#    2. Reload the module (only if ZFS is not in use):                        #
#       sudo modprobe -r zfs && sudo modprobe zfs                             #
#                                                                             #
#  IMPORTANT: If the zfs module is listed in MODULES=() in your               #
#  /etc/mkinitcpio.conf (required for ZFS-on-root), you MUST run:             #
#    sudo mkinitcpio -P                                                       #
#  before rebooting, otherwise the old parameters baked into the initramfs    #
#  image will be used and your changes will be silently ignored.              #
#                                                                             #
#  Some parameters can be tuned at runtime without reboot:                    #
#    echo <value> | sudo tee /sys/module/zfs/parameters/<param>               #
#  However, ARC size parameters (arc_max, arc_min) require an internal        #
#  update cycle before taking full effect.                                    #
#                                                                             #
#  To verify a parameter is active:                                           #
#    cat /sys/module/zfs/parameters/<param>                                   #
#                                                                             #
#  SCALING GUIDE – Adjust arc_max and arc_min to your system RAM:             #
#                                                                             #
#    System RAM   arc_max (bytes)       arc_min (bytes)      Effective*       #
#    ──────────   ──────────────────    ───────────────────  ────────────     #
#     16 GB        8589934592  ( 8 GB)   2147483648  (2 GB)  ~16-24 GB        #
#     32 GB       21474836480  (20 GB)   8589934592  (8 GB)  ~50-60 GB        #
#     64 GB       40055800320  (40 GB)  15000000000 (15 GB)  ~100-120 GB      #
#    128 GB       85899345920  (80 GB)  32212254720 (30 GB)  ~200-240 GB      #
#                                                                             #
#    * Effective capacity assumes compressed ARC with ~2.5x ratio.            #
#      Actual ratio depends on your data and compression algorithm.           #
#                                                                             #
#  WARNING: Setting arc_max too high starves applications of RAM and can      #
#           cause OOM kills. Always leave at least 8-16 GB free for the       #
#           system, applications, and ZFS write buffers (dirty data).         #
#                                                                             #
###############################################################################


###############################################################################
# ARC SIZE – Adaptive Replacement Cache memory bounds
###############################################################################
#
# The ARC is ZFS's crown jewel. Unlike the Linux page cache, the ARC uses
# a patented algorithm that maintains four internal lists: recently used
# data, frequently used data, and ghost lists for evicted entries of each
# type. This allows it to dynamically balance between workloads that
# benefit from recency (e.g., sequential file reads) and workloads that
# benefit from frequency (e.g., repeatedly accessed game assets).
#
# On a properly tuned 64 GB desktop system, ARC hit rates above 95% are
# common — meaning 19 out of 20 read operations are served from RAM at
# memory speed, never touching the NVMe at all.
#
#-----------------------------------------------------------------------------

# zfs_arc_max – Upper bound of ARC size (bytes)
#
#   Default:  50% of total system RAM (auto-calculated)
#   Range:    67108864 (64 MB) – total_RAM
#   Nordix:   40055800320 (~37.3 GB)
#
#   The maximum amount of RAM the ARC is allowed to consume. As files
#   are read from disk, their blocks are cached in the ARC up to this
#   limit. When memory pressure occurs (applications need more RAM),
#   the ARC shrinks by evicting the least valuable cached blocks.
#
#   The ARC is not a fixed reservation — it dynamically grows and
#   shrinks based on system demand. Setting arc_max to 40 GB does
#   not mean 40 GB is permanently unavailable. It means the ARC
#   will not grow beyond 40 GB even when the system is idle.
#
#   On a 64 GB system, ~37 GB leaves roughly 27 GB for:
#     - Desktop applications, games, browsers, IDEs
#     - Kernel slab caches, page tables, tmpfs
#     - ZFS dirty data write buffers (see dirty_data_max_percent)
#     - Headroom for memory spikes
#
#   Common byte values for reference:
#      8 GB =  8589934592       32 GB = 34359738368
#     16 GB = 17179869184       40 GB = 42949672960
#     20 GB = 21474836480       48 GB = 51539607552
#
options zfs zfs_arc_max=40055800320


# zfs_arc_min – Lower bound of ARC size (bytes)
#
#   Default:  max(32 MB, total_RAM / 32)
#   Range:    33554432 (32 MB) – zfs_arc_max
#   Nordix:   15000000000 (~14 GB)
#
#   The floor below which the ARC will refuse to shrink, even under
#   heavy memory pressure from applications. This guarantees a
#   baseline level of read cache performance at all times.
#
#   Without a generous minimum, the kernel's memory reclaim can
#   shrink the ARC to near zero during heavy application load,
#   causing an I/O storm as all subsequent reads must hit disk.
#   This is known as "cache thrashing" and causes severe desktop
#   stutter and application loading delays.
#
#   14 GB ensures that even during peak memory usage (heavy gaming
#   + browser + compilation), the hottest filesystem data and
#   metadata remain cached in RAM.
#
#   Rule of thumb: Set arc_min to 25-40% of arc_max. Too high
#   risks OOM kills because the ARC refuses to yield memory.
#
options zfs zfs_arc_min=15000000000


# zfs_arc_lotsfree_percent – Memory pressure threshold (percent)
#
#   Default:  10
#   Range:    0 – 50
#   Nordix:   1
#
#   When free system memory drops below this percentage of total
#   RAM, ZFS begins throttling I/O and aggressively evicting ARC
#   entries to free memory for other uses.
#
#   At the default of 10%, on a 64 GB system the ARC starts
#   yielding when free RAM drops below ~6.4 GB — very conservative,
#   leaving significant memory unused by both ARC and applications.
#
#   At 1%, the ARC only begins yielding when free RAM drops below
#   ~640 MB. This maximizes cache utilization but leaves minimal
#   headroom for sudden memory spikes.
#
#   Recommended values by system RAM:
#     64+ GB:  1-2%  (aggressive — large buffer absorbs spikes)
#     32 GB:   3-5%  (balanced)
#     16 GB:   5-10% (conservative — limited headroom)
#
#   CAUTION: Values below 2% on systems with less than 32 GB RAM
#   increase the risk of OOM kills if a memory-hungry application
#   starts suddenly before the ARC can shrink fast enough.
#
options zfs zfs_arc_lotsfree_percent=1


###############################################################################
# ARC METADATA – Balancing metadata and data within the cache
###############################################################################
#
# The ARC caches two categories of content:
#
#   Data blocks:     The actual file content (game assets, videos,
#                    documents, binaries)
#   Metadata blocks: Directory entries, dnodes (ZFS equivalent of
#                    inodes), indirect blocks, space maps
#
# Metadata is disproportionately important because reading a single
# file requires traversing several metadata blocks to locate it. But
# metadata can also overwhelm the cache during operations like
# find / or updatedb that scan millions of directory entries without
# reading the actual file data.
#
# These parameters control how the ARC balances between the two.
#
#-----------------------------------------------------------------------------

# zfs_arc_meta_limit_percent – Maximum ARC share for metadata (percent)
#
#   Default:  75
#   Range:    0 – 100
#   Nordix:   50
#
#   Caps how much of the total ARC space metadata buffers can
#   consume. When this limit is reached, the ARC evicts metadata
#   even if overall ARC size is below arc_max.
#
#   50% ensures at least half the ARC is reserved for actual data
#   blocks. On a desktop, your working set is typically a moderate
#   number of large files (game assets, media, project files), not
#   millions of tiny files. Keeping data blocks cached matters more
#   than caching every directory entry on the filesystem.
#
#   Increase toward 75% for workloads with millions of small files
#   (mail servers, large source trees, package build systems).
#
#   With arc_max ~40 GB and 50% metadata limit:
#     Up to 20 GB for metadata, at least 20 GB for data blocks
#
options zfs zfs_arc_meta_limit_percent=50


# zfs_arc_meta_prune – Metadata cache cleanup aggressiveness
#
#   Default:  10000
#   Range:    0 – unlimited (0 disables pruning entirely)
#   Nordix:   131072 (128K)
#
#   When ARC metadata usage approaches arc_meta_limit, the driver
#   runs a "prune" cycle scanning the Linux dentry and inode caches
#   for ZFS entries that can be released. Each released entry unpins
#   ARC buffers held by the VFS layer.
#
#   The default scans 10,000 entries per cycle — conservative.
#   Setting to 131,072 (128K entries) means each prune cycle scans
#   13x more entries, finding and releasing stale metadata faster.
#   This keeps metadata usage under control with fewer total prune
#   cycles, reducing the overhead of repeated small prunes.
#
#   The trade-off: each individual prune cycle takes marginally
#   longer (a few extra milliseconds), but they fire less often.
#   On a desktop system this is completely invisible.
#
options zfs zfs_arc_meta_prune=131072


# zfs_arc_meta_adjust_behavior – Metadata eviction strategy
#
#   Values:   0 = META_ONLY  (only evict metadata buffers)
#             1 = BALANCED   (may evict data blocks to free metadata space)
#   Default:  1
#   Nordix:   0
#
#   Controls what the ARC sacrifices when it needs to reclaim
#   metadata space.
#
#   META_ONLY (0): Only metadata buffers are evicted. Cached data
#   blocks (your game textures, media files, application data) are
#   never sacrificed to make room for metadata. This protects hot
#   data from being flushed by a metadata storm like a recursive
#   find, updatedb, or backup scan.
#
#   BALANCED (1): The ARC may evict data blocks if metadata is
#   heavily pinned and cannot be directly reclaimed. Useful for
#   file servers with millions of files where metadata lookups
#   dominate the workload.
#
#   For desktop and gaming, META_ONLY (0) is the right choice.
#
options zfs zfs_arc_meta_adjust_behavior=0


# zfs_arc_average_blocksize – ARC hash table sizing hint (bytes)
#
#   Default:  8192 (8 KB)
#   Range:    512 – 1048576
#   Nordix:   32768 (32 KB)
#
#   The ARC uses a hash table for O(1) lookups of cached blocks.
#   Its size is calculated from total ARC size divided by the
#   expected average block size — fewer expected blocks means a
#   smaller, more memory-efficient hash table.
#
#   The default assumes 8 KB blocks (traditional ZFS recordsize).
#   Nordix uses 128 KB recordsize for most datasets, so telling
#   the ARC to expect 128 KB blocks shrinks the hash table by ~16x.
#
#   With 40 GB ARC and 8 KB assumption:  ~40 MB hash table
#   With 40 GB ARC and 128 KB assumption: ~2.5 MB hash table
#
#
options zfs zfs_arc_average_blocksize=32768


###############################################################################
# COMPRESSED ARC – Multiply your cache capacity
###############################################################################
#
# One of ZFS's most powerful features. When enabled, data blocks are
# stored in the ARC in their on-disk compressed form and decompressed
# on demand when read. This effectively multiplies the ARC's capacity
# by the compression ratio of your data — at the cost of trivial CPU
# overhead for decompression.
#
#-----------------------------------------------------------------------------

# zfs_compressed_arc_enabled – Store compressed blocks in the ARC
#
#   Values:   0 = Disabled (decompress before caching — wastes RAM)
#             1 = Enabled  (cache in compressed form — multiplies capacity)
#   Default:  1
#   Nordix:   1
#
#   Practical impact with typical compression ratios:
#
#     Algorithm    Ratio    40 GB ARC → Effective capacity
#     ──────────   ─────    ─────────────────────────────
#     LZ4          ~2.0x    ~80 GB
#     ZSTD         ~2.5x    ~100 GB
#     ZSTD (high)  ~3.0x    ~120 GB
#
#   A 64 GB system with compressed ARC can behave like a machine
#   with 100-120 GB of traditional filesystem cache.
#
#   CPU cost is negligible on modern hardware:
#     LZ4:   ~5 GB/s decompression per core
#     ZSTD:  ~1.5 GB/s decompression per core
#   Both are orders of magnitude faster than any SSD read.
#
#   There is no reason to disable this on any system.
#
options zfs zfs_compressed_arc_enabled=1


###############################################################################
# READ I/O – Asynchronous read queue depths
###############################################################################
#
# ZFS has an internal I/O scheduler that controls how many operations
# of each type can be in flight simultaneously per vdev (virtual device,
# i.e., physical disk). These "active" limits control parallelism.
#
# NVMe and SSDs: Thrive on parallelism. They have multiple internal
# flash channels and command queues. High queue depths keep all channels
# busy and maximize throughput.
#
# HDDs: Inherently serial. High parallelism causes excessive seeking.
# Keep values low (3-5) for spinning disks.
#
#-----------------------------------------------------------------------------

# zfs_vdev_async_read_max_active – Maximum concurrent async reads per vdev
#
#   Default:  3
#   Range:    1 – 1000
#   Nordix:   32
#
#   The maximum number of asynchronous read I/O requests in flight
#   per vdev at any time. Async reads include prefetching, ARC miss
#   servicing, and background data loading.
#
#   NVMe drives typically support 64K+ outstanding commands across
#   multiple hardware queues. Setting this to 32 begins to exploit
#   that parallelism without overwhelming the kernel I/O scheduler.
#
#   Going beyond 32 shows diminishing returns on consumer NVMe.
#   Enterprise NVMe with very high IOPS can benefit from 64-128.
#
#   For HDD pools: Use 3-10.
#
options zfs zfs_vdev_async_read_max_active=32


# zfs_vdev_async_read_min_active – Minimum concurrent async reads per vdev
#
#   Default:  1
#   Range:    1 – zfs_vdev_async_read_max_active
#   Nordix:   8
#
#   The minimum number of async reads kept in flight at all times,
#   even during low-demand periods. This prevents the device command
#   queue from draining completely between bursts, avoiding the
#   latency penalty of queue ramp-up.
#
#   8 keeps the NVMe continuously active with pending reads, ideal
#   for SSDs where idle power is low and latency matters more than
#   saving a few milliwatts.
#
#   For HDD pools: Use 1-3.
#
options zfs zfs_vdev_async_read_min_active=8


# zfs_vdev_sync_read_max_active – Maximum concurrent sync reads per vdev
#
#   Default:  10
#   Range:    1 – 1000
#   Nordix:   32
#
#   Synchronous reads are blocking — the requesting application waits
#   until the read completes. They occur during:
#     - mmap faults (applications memory-mapping files)
#     - fsync verification reads
#     - Direct I/O reads
#     - Steam game integrity verification
#     - Database page reads
#
#   The default of 10 is tuned for HDDs where high read parallelism
#   causes head thrashing. On NVMe, 32 concurrent sync reads exploit
#   the device's multi-queue architecture and dramatically reduce
#   wait times for applications blocked on read completion.
#
#   This directly impacts perceived application responsiveness:
#   faster sync reads mean faster program startup, faster file
#   opening, and faster game loading.
#
#   For HDD pools: Keep at 10.
#
options zfs zfs_vdev_sync_read_max_active=32


# zfs_vdev_sync_read_min_active – Minimum concurrent sync reads per vdev
#
#   Default:  10
#   Range:    1 – zfs_vdev_sync_read_max_active
#   Nordix:   8
#
#   Baseline sync read parallelism. Unlike async reads, the default
#   min is already 10 (matching the default max). Setting min to 8
#   with max at 32 creates a dynamic range: ZFS can scale from 8
#   to 32 depending on demand, rather than always holding 10 slots.
#
#   For HDD pools: Keep at 10.
#
options zfs zfs_vdev_sync_read_min_active=8


###############################################################################
# WRITE I/O – Write queue depths and dirty data management
###############################################################################
#
# ZFS writes are transactional. Modified data accumulates in memory as
# "dirty data" and is flushed to disk in batches when a transaction
# group (TXG) commits. This batching turns many small random writes
# into fewer, larger sequential writes — dramatically better for SSDs
# and essential for HDDs.
#
# The parameters below control write parallelism, dirty data limits,
# and TXG commit frequency.
#
#-----------------------------------------------------------------------------

# zfs_vdev_async_write_max_active – Maximum concurrent async writes per vdev
#
#   Default:  10
#   Range:    1 – 1000
#   Nordix:   16
#
#   The maximum number of asynchronous write operations in flight
#   per vdev during a TXG commit. Higher values speed up the commit
#   (less time with dirty data in memory) but place more load on
#   the device.
#
#   16 is a moderate increase that improves TXG commit throughput
#   on NVMe without creating excessive write pressure that could
#   cause latency spikes for concurrent reads.
#
#   For HDD pools: Use 5-10.
#
options zfs zfs_vdev_async_write_max_active=16


# zfs_vdev_async_write_min_active – Minimum concurrent async writes per vdev
#
#   Default:  1
#   Range:    1 – zfs_vdev_async_write_max_active
#   Nordix:   4
#
#   Baseline write parallelism during TXG commits. Keeps the NVMe
#   write queue warm and prevents throughput dips from queue drain.
#
options zfs zfs_vdev_async_write_min_active=4


# zfs_vdev_sync_write_max_active – Maximum concurrent sync writes per vdev
#
#   Default:  10
#   Range:    1 – 1000
#   Nordix:   8
#
#   Sync writes are the most latency-critical I/O type. They are
#   issued by fsync(), O_SYNC, and the ZIL (ZFS Intent Log). The
#   calling application is blocked until these complete.
#
#   8 provides good parallelism for sync-heavy workloads while
#   leaving bandwidth headroom for async operations.
#
#   For database workloads: Increase to 10-15.
#   For pure desktop use: 5-8 is sufficient.
#
options zfs zfs_vdev_sync_write_max_active=8


# zfs_dirty_data_max_percent – Maximum dirty data in RAM (percent of RAM)
#
#   Default:  10
#   Range:    1 – 75
#   Nordix:   40
#
#   ZFS accumulates modified ("dirty") data in memory before flushing
#   it to disk in batch during TXG commits. This sets the maximum
#   as a percentage of total system RAM.
#
#   On a 64 GB system:
#     10% (default) =  ~6.4 GB dirty data buffer
#     40% (Nordix)  = ~25.6 GB dirty data buffer
#
#   Larger buffers allow more write coalescing (multiple writes to
#   the same block merge into one), larger sequential write batches,
#   and fewer TXG commits — all of which improve write throughput
#   and reduce SSD wear.
#
#   The risk: If the system loses power with 25 GB of dirty data,
#   that uncommitted data is lost. However, ZFS guarantees filesystem
#   consistency regardless — you lose recent writes, not the pool.
#   The TXG timeout (below) limits actual data loss to a few seconds.
#
#   CAUTION: On 16 GB systems, use 20-25%. On 32 GB systems, use
#   30-40%. Values above 50% risk OOM from combined ARC + dirty
#   data + application memory pressure.
#
options zfs zfs_dirty_data_max_percent=40


# zfs_txg_timeout – Transaction group commit interval (seconds)
#
#   Default:  5
#   Range:    1 – 120
#   Nordix:   5
#
#   How often ZFS closes the current transaction group and flushes
#   its dirty data to disk.
#
#   Lower (1-5 seconds):
#     + Less data loss on power failure (at most N seconds of writes)
#     + More predictable, consistent write latency
#     - More frequent commits, slightly higher SSD wear
#     - Less opportunity for write coalescing
#
#   Higher (10-30 seconds):
#     + Better write coalescing and peak throughput
#     + Fewer commits, less SSD wear
#     - More data loss on power failure
#     - Bursty I/O (long quiet periods then heavy write storms)
#
#   5 seconds is the sweet spot for interactive desktop use:
#   responsive writes, bounded data loss, and good synergy with
#   the generous dirty_data_max_percent allowing large batches
#   within each 5-second window.
#
options zfs zfs_txg_timeout=5


# zfs_immediate_write_sz – ZIL bypass threshold for large writes (bytes)
#
#   Default:  32768 (32 KB)
#   Range:    0 – unlimited
#   Nordix:   131072 (128 KB)
#
#   Controls how large a data block must be before ZFS skips the
#   ZFS Intent Log (ZIL) and writes it directly to the pool. The
#   ZIL is a write-ahead log that guarantees data integrity for
#   sync writes — but logging large blocks to the ZIL first, then
#   writing them again to the pool, is double-writing.
#
#   When a sync write is larger than this threshold, ZFS writes it
#   directly to its final pool location and only logs a pointer in
#   the ZIL. This is called "indirect mode" (vs. "immediate mode"
#   for small writes where the data itself is stored in the ZIL).
#
#   On systems without a dedicated SLOG device (most desktops),
#   the ZIL lives on the same NVMe as the pool. Double-writing
#   large blocks wastes bandwidth and increases SSD wear.
#
#   128 KB matches the Nordix default recordsize and ensures that
#   typical full-block writes (game saves, file downloads,
#   application data) bypass the ZIL overhead entirely.
#
#   Only applies to pools without a separate SLOG device. If you
#   have a dedicated SLOG, lower values may be preferable since
#   the SLOG can absorb the writes on a different device.
#
options zfs zfs_immediate_write_sz=131072


###############################################################################
# SCRUB & RESILVER – Data integrity and rebuild speed
###############################################################################
#
# Scrub: Reads every block on disk and verifies its checksum against
# the stored value. Detects silent data corruption ("bit rot") and, on
# redundant pools (mirror/RAIDZ), automatically repairs corrupted blocks
# from good copies. Run monthly for data safety.
#
# Resilver: Rebuilds a degraded pool after a disk replacement. Speed
# matters because the pool is vulnerable to a second failure during
# resilver.
#
# These settings are tuned for NVMe/SSD pools where scrub and resilver
# should complete as fast as possible. The devices can handle the load
# without impacting desktop responsiveness.
#
# For HDD pools: Consider adding throttling (delay=2-4, lower max_active)
# to keep the system responsive during multi-hour scrub operations.
#
#-----------------------------------------------------------------------------

# zfs_resilver_delay – Pause between resilver I/Os (ticks)
#
#   Default:  2
#   Range:    0 – 100
#   Nordix:   0
#
#   Artificial delay inserted between resilver I/O operations to
#   reduce impact on foreground workloads. Setting to 0 removes
#   all throttling, allowing resilver to run at full device speed.
#
#   On NVMe/SSD: Always set to 0. Fast resilver means less time
#   in a degraded (vulnerable) state.
#
#   On HDD: Consider 2-4 to prevent resilver from starving
#   interactive I/O.
#
options zfs zfs_resilver_delay=0


# zfs_scrub_delay – Pause between scrub I/Os (ticks)
#
#   Default:  4
#   Range:    0 – 100
#   Nordix:   0
#
#   Same concept as resilver_delay, applied to scrub operations.
#   Zero means maximum scrub speed.
#
#   On a 1 TB NVMe pool, a full scrub at zero delay completes in
#   minutes. With default throttling it can take an hour or more.
#
#   On HDD or very large pools (10+ TB): Use 2-10 for background
#   scrub that does not noticeably impact system responsiveness.
#
options zfs zfs_scrub_delay=0


# zfs_scan_idle – Idle delay between scan batches (ticks)
#
#   Default:  0
#   Range:    0 – 100
#   Nordix:   0
#
#   Additional idle time between batches of scrub/resilver
#   operations. A second throttling layer on top of the per-I/O
#   delay. Zero means no idle pause between batches.
#
options zfs zfs_scan_idle=0


# zfs_vdev_scrub_max_active – Maximum concurrent scrub I/Os per vdev
#
#   Default:  2
#   Range:    1 – 1000
#   Nordix:   5
#
#   How many scrub read operations can be in flight per vdev at
#   once. The default of 2 is very conservative, designed to keep
#   scrub impact minimal on HDDs.
#
#   Increasing to 5 significantly accelerates scrub on NVMe/SSD
#   while still leaving most device bandwidth for normal operations.
#   For pure-SSD pools where scrub speed is paramount, 10-20 is
#   safe.
#
#   For HDD pools: Keep at 2-3.
#
options zfs zfs_vdev_scrub_max_active=5


###############################################################################
# PREFETCH – Sequential read-ahead prediction
###############################################################################

# zfs_prefetch_disable – Toggle speculative read-ahead
#
#   Values:   0 = Enabled  (prefetch ahead of sequential access patterns)
#             1 = Disabled (only read exactly what is requested)
#   Default:  0 (enabled)
#   Nordix:   0
#
#   ZFS detects sequential access patterns and proactively reads
#   blocks ahead into the ARC before the application requests them.
#   This dramatically speeds up sequential workloads:
#     - Game level loading (reading asset files in sequence)
#     - Video playback and editing
#     - File copies and backups
#     - Application startup (loading libraries)
#
#   Disable (1) only for workloads that are purely random I/O
#   (databases with random key lookups) where prefetching wastes
#   bandwidth on blocks that will never be accessed.
#
options zfs zfs_prefetch_disable=0


###############################################################################
# I/O AGGREGATION – Merging adjacent small I/Os
###############################################################################

# zfs_vdev_aggregation_limit – Maximum merged I/O size (bytes)
#
#   Default:  1048576 (1 MB)
#   Range:    0 – 16777216 (16 MB)
#   Nordix:   131072 (128 KB)
#
#   When multiple I/O requests target adjacent disk blocks, ZFS can
#   merge them into a single larger request. Fewer, larger I/Os are
#   more efficient for the storage device.
#
#   128 KB matches the optimal transfer size of most consumer NVMe
#   drives. Going larger (512 KB – 1 MB) can improve throughput for
#   large sequential workloads but may increase tail latency for
#   small random reads that get stuck behind a large merged I/O.
#
#   For HDD pools: Increase to 256 KB – 1 MB. HDDs strongly benefit
#   from fewer, larger sequential I/Os that minimize seeking.
#
options zfs zfs_vdev_aggregation_limit=131072


# zfs_vdev_read_gap_limit – Maximum gap for read I/O merging (bytes)
#
#   Default:  32768 (32 KB)
#   Range:    0 – unlimited
#   Nordix:   65536 (64 KB)
#
#   When two read requests target blocks that are close but not
#   perfectly adjacent on disk, ZFS can merge them into a single
#   larger read — but only if the gap between them is smaller than
#   this threshold. The "gap" data is read and discarded.
#
#   On HDDs, reading gap data is cheap (the head is already in the
#   area) and avoids a costly seek. On NVMe, there is no seek, but
#   reading slightly more contiguous data is still more efficient
#   than issuing two separate I/O commands.
#
#   64 KB allows merging reads that are up to 64 KB apart, which
#   captures the majority of related file blocks that are close
#   but not perfectly contiguous due to copy-on-write allocation.
#
options zfs zfs_vdev_read_gap_limit=65536


# zfs_vdev_write_gap_limit – Maximum gap for write I/O merging (bytes)
#
#   Default:  4096 (4 KB)
#   Range:    0 – unlimited
#   Nordix:   16384 (16 KB)
#
#   Same concept as read_gap_limit, applied to write operations
#   during TXG commits. Allows merging writes that are up to this
#   many bytes apart into a single operation.
#
#   The default of 4 KB is very conservative. 16 KB allows more
#   aggressive write coalescing, resulting in fewer but larger
#   writes to the NVMe. This reduces total I/O operations and
#   improves TXG commit throughput.
#
#   The trade-off is writing slightly more data than strictly
#   necessary (the gap is zero-padded), but on NVMe the bandwidth
#   is abundant and the reduction in IOPS is worth it.
#
options zfs zfs_vdev_write_gap_limit=16384


###############################################################################
# METASLAB ALLOCATION – SSD-optimized block placement
###############################################################################

# metaslab_lba_weighting_enabled – LBA-based allocation bias
#
#   Values:   0 = Disabled (all addresses treated equally)
#             1 = Enabled  (prefer lower LBA addresses)
#   Default:  1
#   Nordix:   0
#
#   By default, ZFS prefers to allocate blocks at lower Logical
#   Block Addresses (LBAs). This is a legacy optimization for
#   spinning disks where the outer edge of the platter (lower LBAs)
#   has higher linear velocity and thus greater bandwidth.
#
#   On NVMe and SSDs this is completely irrelevant — all addresses
#   have identical access latency and throughput regardless of LBA.
#   Worse, the bias causes uneven wear and premature fragmentation
#   by concentrating allocations at the beginning of the device
#   while leaving the rest underutilized.
#
#   Disabling this on all-SSD/NVMe systems results in:
#     - More even space utilization across the entire device
#     - Better wear leveling (the SSD controller has more to work with)
#     - Reduced fragmentation over time
#     - Marginally faster allocation (no weight calculation needed)
#
#   Only enable on pools that contain spinning disks.
#
options zfs metaslab_lba_weighting_enabled=0


###############################################################################
# L2ARC – Secondary read cache on a dedicated device (optional)
###############################################################################
#
# The L2ARC extends the in-memory ARC by caching evicted blocks on a
# dedicated SSD or NVMe device. Data that is evicted from RAM is written
# to the L2ARC device instead of being discarded, giving it a second
# chance to be served quickly.
#
# When L2ARC is useful:
#   - Pool is on HDDs and you have a spare SSD for caching
#   - Working set exceeds available RAM
#   - Read-heavy workloads with a large but bounded hot data set
#
# When L2ARC is NOT needed:
#   - All-NVMe pool with 64+ GB RAM (ARC is already fast and large)
#   - Write-heavy workloads (L2ARC only caches reads)
#   - Small pools that fit mostly in ARC already
#
# To add an L2ARC device to your pool:
#   zpool add <pool> cache <device>
#
# These settings only take effect if an L2ARC device is present.
# They are commented out by default since Nordix targets all-NVMe
# systems where L2ARC is typically unnecessary.
#
#-----------------------------------------------------------------------------

# l2arc_write_max – Maximum L2ARC fill rate (bytes per second)
#
#   Default:  8388608 (8 MB/s — extremely conservative)
#   Nordix:   268435456 (256 MB/s)
#
#   How fast data is written to the L2ARC device. The default of
#   8 MB/s can take hours to fill a large cache device after boot.
#   256 MB/s fills the cache in minutes, reaching full effectiveness
#   quickly. Modern NVMe easily sustains this rate.
#
#options zfs l2arc_write_max=268435456


# l2arc_write_boost – Extra fill rate while L2ARC is cold (bytes/s)
#
#   Default:  8388608 (8 MB/s)
#   Nordix:   536870912 (512 MB/s)
#
#   After reboot or pool import, the L2ARC is empty ("cold"). This
#   adds extra write bandwidth on top of l2arc_write_max during the
#   warm-up period. Boost decays automatically as the cache fills.
#
#   512 MB/s boost + 256 MB/s base = 768 MB/s initial fill rate.
#
#options zfs l2arc_write_boost=536870912


# l2arc_headroom – Cache candidate scan depth (multiplier)
#
#   Default:  2
#   Nordix:   8
#
#   How far through the ARC eviction lists to scan for L2ARC-worthy
#   content, as a multiplier of l2arc_write_max. Higher values let
#   the L2ARC feeder be more selective, caching the most valuable
#   data rather than whatever was evicted most recently.
#
#options zfs l2arc_headroom=8


# l2arc_noprefetch – Exclude prefetched data from L2ARC
#
#   Values:   0 = Cache prefetched data in L2ARC
#             1 = Do not cache prefetched data (default)
#   Nordix:   0
#
#   By default, speculatively prefetched data (read-ahead) is not
#   written to L2ARC because it might never be accessed again.
#   For desktop/gaming, prefetched data (game assets, level data)
#   is very likely to be re-read, making it a good L2ARC candidate.
#
#options zfs l2arc_noprefetch=0


# l2arc_rebuild_enabled – Persist L2ARC index across reboots
#
#   Values:   0 = L2ARC starts empty after reboot
#             1 = L2ARC index survives reboot (instant warm cache)
#   Default:  1
#   Nordix:   1
#
#   ZFS stores an index of L2ARC contents on the cache device. On
#   reboot, the index is read and the L2ARC is immediately available
#   without refilling from scratch. Eliminates the "cold cache"
#   period after reboot. Requires OpenZFS 2.0+.
#
#options zfs l2arc_rebuild_enabled=1


