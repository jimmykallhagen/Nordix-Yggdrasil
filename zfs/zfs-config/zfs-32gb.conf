###############################################################################
#                                                                             #
#  USEFUL COMMANDS                                                            #
#                                                                             #
#  Show all ZFS module parameters:                                            #
#    for f in /sys/module/zfs/parameters/zfs_*; do                            #
#      echo "$(basename $f) = $(cat $f 2>/dev/null)"; done                    #
#                                                                             #
#  ARC hit rate (target: >90%):                                               #
#    awk '/^hits/{h=$3} /^misses/{m=$3} END{                                  #
#      printf "%.1f%%\n",h/(h+m)*100}' /proc/spl/kstat/zfs/arcstats           #
#                                                                             #
#  Monitor ARC in real time:                                                  #
#    watch -n1 'grep -E "^(size|c_max|c_min|hits|misses)" \                   #
#      /proc/spl/kstat/zfs/arcstats'                                          #
#                                                                             #
#  Friendly ARC summary:    arc_summary                                       #
#  Full ARC statistics:     cat /proc/spl/kstat/zfs/arcstats                  #
#  Check compression ratio: zfs get compressratio <pool>                      #
#  Run a scrub:             sudo zpool scrub <pool>                           #
#  Monitor I/O per vdev:    zpool iostat -v <pool> 1                          #
#  Pool health check:       zpool status -x                                   #
#                                                                             #
