###############################################################################
#                                                                             #
#                   Nordix ZFS Performance Configuration                      #
#                                                                             #
#  File:      /etc/modprobe.d/zfs.conf                                        #
#  Purpose:   Kernel module parameters for the OpenZFS driver                 #
#  Profile:   Performance desktop – 32 GB RAM – NVMe/SSD                      #
#                                                                             #
#  ZFS uses the Adaptive Replacement Cache (ARC), a sophisticated in-memory   #
#  read cache that combines recency and frequency heuristics to achieve       #
#  significantly higher hit rates than a traditional LRU cache. On a well-    #
#  tuned system, the vast majority of disk reads are served directly from     #
#  RAM. ARC tuning is the single most impactful thing you can do for ZFS      #
#  performance.                                                               #
#                                                                             #
#  After making changes you must either:                                      #
#    1. Reboot the system, OR                                                 #
#    2. Reload the module (only if ZFS is not in use):                        #
#       sudo modprobe -r zfs && sudo modprobe zfs                             #
#                                                                             #
#  IMPORTANT: If the zfs module is listed in MODULES=() in your               #
#  /etc/mkinitcpio.conf (required for ZFS-on-root), you MUST run:             #
#    sudo mkinitcpio -P                                                       #
#  before rebooting, otherwise the old parameters baked into the initramfs    #
#  image will be used and your changes will be silently ignored.              #
#                                                                             #
#  Some parameters can be tuned at runtime without reboot:                    #
#    echo <value> | sudo tee /sys/module/zfs/parameters/<param>               #
#  However, ARC size parameters (arc_max, arc_min) require an internal        #
#  update cycle before taking full effect.                                    #
#                                                                             #
#  To verify a parameter is active:                                           #
#    cat /sys/module/zfs/parameters/<param>                                   #
#                                                                             #
#  SCALING GUIDE – All Nordix RAM profiles:                                   #
#                                                                             #
#    System RAM   arc_max (bytes)       arc_min (bytes)      Effective*       #
#    ──────────   ──────────────────    ───────────────────  ────────────     #
#      8 GB        4294967296  ( 4 GB)   1073741824  (1 GB)  ~8-12 GB         #
#     16 GB        8589934592  ( 8 GB)   2147483648  (2 GB)  ~16-24 GB        #
#     32 GB       21474836480  (20 GB)   8589934592  (8 GB)  ~50-60 GB        #
#     64 GB       40055800320  (40 GB)  15000000000 (15 GB)  ~100-120 GB      #
#    128 GB       85899345920  (80 GB)  32212254720 (30 GB)  ~200-240 GB      #
#                                                                             #
#    * Effective capacity assumes compressed ARC with ~2.5x ratio.            #
#      Actual ratio depends on your data and compression algorithm.           #
#                                                                             #
#  WARNING: Setting arc_max too high starves applications of RAM and can      #
#           cause OOM kills. Always leave at least 2-16 GB free for the       #
#           system, applications, and ZFS write buffers (dirty data).         #
#                                                                             #
###############################################################################


###############################################################################
# ARC SIZE – Adaptive Replacement Cache memory bounds
###############################################################################
#
# The ARC is ZFS's crown jewel. Unlike the Linux page cache, the ARC uses
# a patented algorithm that maintains four internal lists: recently used
# data, frequently used data, and ghost lists for evicted entries of each
# type. This allows it to dynamically balance between workloads that
# benefit from recency (e.g., sequential file reads) and workloads that
# benefit from frequency (e.g., repeatedly accessed game assets).
#
# On a properly tuned 32 GB desktop system, ARC hit rates above 92% are
# typical — meaning most read operations are served from RAM at memory
# speed, never touching the NVMe at all.
#
#-----------------------------------------------------------------------------

# zfs_arc_max – Upper bound of ARC size (bytes)
#
#   Default:  50% of total system RAM (auto-calculated)
#   Range:    67108864 (64 MB) – total_RAM
#   Nordix:   21474836480 (~20 GB)
#
#   The maximum amount of RAM the ARC is allowed to consume. As files
#   are read from disk, their blocks are cached in the ARC up to this
#   limit. When memory pressure occurs (applications need more RAM),
#   the ARC shrinks by evicting the least valuable cached blocks.
#
#   The ARC is not a fixed reservation — it dynamically grows and
#   shrinks based on system demand. Setting arc_max to 20 GB does
#   not mean 20 GB is permanently unavailable. It means the ARC
#   will not grow beyond 20 GB even when the system is idle.
#
#   On a 32 GB system, 20 GB leaves roughly ~12 GB for:
#     - Desktop applications, games, browsers, IDEs
#     - Kernel slab caches, page tables, tmpfs
#     - ZFS dirty data write buffers (see dirty_data_max_percent)
#     - Headroom for memory spikes
#
options zfs zfs_arc_max=21474836480


# zfs_arc_min – Lower bound of ARC size (bytes)
#
#   Default:  max(32 MB, total_RAM / 32)
#   Range:    33554432 (32 MB) – zfs_arc_max
#   Nordix:   8589934592 (~8 GB)
#
#   The floor below which the ARC will refuse to shrink, even under
#   heavy memory pressure from applications. This guarantees a
#   baseline level of read cache performance at all times.
#
#   Without a generous minimum, the kernel's memory reclaim can
#   shrink the ARC to near zero during heavy application load,
#   causing an I/O storm as all subsequent reads must hit disk.
#   This is known as "cache thrashing" and causes severe desktop
#   stutter and application loading delays.
#
#   8 GB ensures that even during peak memory usage, the hottest
#   filesystem data and metadata remain cached in RAM.
#
#   Rule of thumb: Set arc_min to 25-40% of arc_max. Too high
#   risks OOM kills because the ARC refuses to yield memory.
#
options zfs zfs_arc_min=8589934592


# zfs_arc_lotsfree_percent – Memory pressure threshold (percent)
#
#   Default:  10
#   Range:    0 – 50
#   Nordix:   3
#
#   When free system memory drops below this percentage of total
#   RAM, ZFS begins throttling I/O and aggressively evicting ARC
#   entries to free memory for other uses.
#
#   Recommended values by system RAM:
#     128 GB:  1%    (aggressive — huge buffer absorbs any spike)
#     64 GB:   1-2%  (aggressive — large buffer absorbs spikes)
#     32 GB:   3-5%  (balanced)
#     16 GB:   5-8%  (conservative — limited headroom)
#      8 GB:   8-10% (safe — must protect against OOM)
#
#   CAUTION: Values below 5% on systems with less than 16 GB RAM
#   increase the risk of OOM kills if a memory-hungry application
#   starts suddenly before the ARC can shrink fast enough.
#
options zfs zfs_arc_lotsfree_percent=3


###############################################################################
# ARC METADATA – Balancing metadata and data within the cache
###############################################################################
#
# The ARC caches two categories of content:
#
#   Data blocks:     The actual file content (game assets, videos,
#                    documents, binaries)
#   Metadata blocks: Directory entries, dnodes (ZFS equivalent of
#                    inodes), indirect blocks, space maps
#
# Metadata is disproportionately important because reading a single
# file requires traversing several metadata blocks to locate it. But
# metadata can also overwhelm the cache during operations like
# find / or updatedb that scan millions of directory entries without
# reading the actual file data.
#
#-----------------------------------------------------------------------------

# zfs_arc_meta_limit_percent – Maximum ARC share for metadata (percent)
#
#   Default:  75
#   Range:    0 – 100
#   Nordix:   50
#
#   Caps how much of the total ARC space metadata buffers can
#   consume. 50% ensures at least half the ARC is reserved for
#   actual data blocks — the right balance for desktop workloads
#   where your working set is typically a moderate number of large
#   files (game assets, media, project files), not millions of
#   tiny files.
#
options zfs zfs_arc_meta_limit_percent=50


# zfs_arc_meta_prune – Metadata cache cleanup aggressiveness
#
#   Default:  10000
#   Range:    0 – unlimited (0 disables pruning entirely)
#   Nordix:   98304 (96K entries)
#
#   When ARC metadata usage approaches arc_meta_limit, the driver
#   runs a "prune" cycle scanning the Linux dentry and inode caches
#   for ZFS entries that can be released. Higher values scan more
#   entries per cycle, finding and releasing stale metadata faster.
#
options zfs zfs_arc_meta_prune=98304


# zfs_arc_meta_adjust_behavior – Metadata eviction strategy
#
#   Values:   0 = META_ONLY  (only evict metadata buffers)
#             1 = BALANCED   (may evict data blocks to free metadata space)
#   Default:  1
#   Nordix:   0
#
#   META_ONLY (0): Cached data blocks (your game textures, media
#   files, application data) are never sacrificed to make room for
#   metadata. This protects hot data from being flushed by a
#   metadata storm like a recursive find, updatedb, or backup scan.
#
#   For desktop and gaming, META_ONLY (0) is the right choice.
#
options zfs zfs_arc_meta_adjust_behavior=0


# zfs_arc_average_blocksize – ARC hash table sizing hint (bytes)
#
#   Default:  8192 (8 KB)
#   Range:    512 – 1048576
#   Nordix:   32768 (32 KB)
#
#   The ARC uses a hash table for O(1) lookups of cached blocks.
#   Set this to match your most common dataset recordsize to
#   optimize hash table memory usage.
#
options zfs zfs_arc_average_blocksize=32768


###############################################################################
# COMPRESSED ARC – Multiply your cache capacity
###############################################################################
#
# When enabled, data blocks are stored in the ARC in their on-disk
# compressed form and decompressed on demand when read. This effectively
# multiplies the ARC's capacity by the compression ratio of your data.
#
# On this 32 GB system with ~20 GB ARC, effective capacity
# is approximately ~50-60 GB with typical ZSTD compression.
#
# CPU cost is negligible on modern hardware. There is no reason to
# disable this on any system.
#
#-----------------------------------------------------------------------------

# zfs_compressed_arc_enabled – Store compressed blocks in the ARC
#
#   Values:   0 = Disabled (decompress before caching — wastes RAM)
#             1 = Enabled  (cache in compressed form — multiplies capacity)
#   Default:  1
#   Nordix:   1
#
options zfs zfs_compressed_arc_enabled=1


###############################################################################
# READ I/O – Asynchronous and synchronous read queue depths
###############################################################################
#
# ZFS has an internal I/O scheduler that controls how many operations
# of each type can be in flight simultaneously per vdev. NVMe and SSDs
# thrive on parallelism. HDDs are inherently serial — keep values low
# (3-5) for spinning disks.
#
#-----------------------------------------------------------------------------

# zfs_vdev_async_read_max_active – Maximum concurrent async reads per vdev
#
#   Default:  3
#   Range:    1 – 1000
#   Nordix:   32
#
#   Async reads include prefetching, ARC miss servicing, and
#   background data loading. Higher values exploit NVMe parallelism.
#
options zfs zfs_vdev_async_read_max_active=32


# zfs_vdev_async_read_min_active – Minimum concurrent async reads per vdev
#
#   Default:  1
#   Range:    1 – zfs_vdev_async_read_max_active
#   Nordix:   8
#
#   Keeps the NVMe read queue warm between burst periods.
#
options zfs zfs_vdev_async_read_min_active=8


# zfs_vdev_sync_read_max_active – Maximum concurrent sync reads per vdev
#
#   Default:  10
#   Range:    1 – 1000
#   Nordix:   32
#
#   Sync reads are blocking — the application waits until complete.
#   They occur during mmap faults, fsync, direct I/O, and game
#   integrity verification. Higher values reduce application wait
#   times on NVMe.
#
options zfs zfs_vdev_sync_read_max_active=32


# zfs_vdev_sync_read_min_active – Minimum concurrent sync reads per vdev
#
#   Default:  10
#   Range:    1 – zfs_vdev_sync_read_max_active
#   Nordix:   8
#
#   Baseline sync read parallelism.
#
options zfs zfs_vdev_sync_read_min_active=8


###############################################################################
# WRITE I/O – Write queue depths and dirty data management
###############################################################################
#
# ZFS writes are transactional. Modified data accumulates in memory as
# "dirty data" and is flushed to disk in batches when a transaction
# group (TXG) commits. The parameters below control write parallelism,
# dirty data limits, and TXG commit frequency.
#
#-----------------------------------------------------------------------------

# zfs_vdev_async_write_max_active – Maximum concurrent async writes per vdev
#
#   Default:  10
#   Range:    1 – 1000
#   Nordix:   16
#
#   Controls TXG commit throughput.
#
options zfs zfs_vdev_async_write_max_active=16


# zfs_vdev_async_write_min_active – Minimum concurrent async writes per vdev
#
#   Default:  1
#   Range:    1 – zfs_vdev_async_write_max_active
#   Nordix:   4
#
#   Keeps the NVMe write queue warm during TXG commits.
#
options zfs zfs_vdev_async_write_min_active=4


# zfs_vdev_sync_write_max_active – Maximum concurrent sync writes per vdev
#
#   Default:  10
#   Range:    1 – 1000
#   Nordix:   8
#
#   Sync writes are the most latency-critical I/O type (fsync,
#   O_SYNC, ZIL). The application is blocked until these complete.
#
options zfs zfs_vdev_sync_write_max_active=8


# zfs_dirty_data_max_percent – Maximum dirty data in RAM (percent of RAM)
#
#   Default:  10
#   Range:    1 – 75
#   Nordix:   30
#
#   On a 32 GB system: 30% = ~9.6 GB dirty data buffer.
#   Larger buffers allow more write coalescing and fewer TXG commits.
#
#   CAUTION: Combined ARC + dirty data + applications must fit in RAM.
#
options zfs zfs_dirty_data_max_percent=30


# zfs_txg_timeout – Transaction group commit interval (seconds)
#
#   Default:  5
#   Range:    1 – 120
#   Nordix:   5
#
#   5 seconds is the sweet spot for interactive desktop use:
#   responsive writes, bounded data loss, and good synergy with
#   the dirty_data_max_percent setting.
#
options zfs zfs_txg_timeout=5


# zfs_immediate_write_sz – ZIL bypass threshold for large writes (bytes)
#
#   Default:  32768 (32 KB)
#   Range:    0 – unlimited
#   Nordix:   131072 (128 KB)
#
#   Data blocks larger than this skip the ZIL and write directly
#   to the pool, avoiding double-writing on systems without a
#   dedicated SLOG device. Matches Nordix recordsize.
#
options zfs zfs_immediate_write_sz=131072


###############################################################################
# SCRUB & RESILVER – Data integrity and rebuild speed
###############################################################################
#
# Tuned for NVMe/SSD: maximum speed, no throttling. For HDD pools,
# consider adding delays (resilver_delay=2-4, scrub_delay=2-10).
#
#-----------------------------------------------------------------------------

# zfs_resilver_delay – Pause between resilver I/Os (ticks)
#   Default: 2 | Nordix: 0 (no throttling)
options zfs zfs_resilver_delay=0

# zfs_scrub_delay – Pause between scrub I/Os (ticks)
#   Default: 4 | Nordix: 0 (maximum scrub speed)
options zfs zfs_scrub_delay=0

# zfs_scan_idle – Idle delay between scan batches (ticks)
#   Default: 0 | Nordix: 0 (no idle pause)
options zfs zfs_scan_idle=0

# zfs_vdev_scrub_max_active – Maximum concurrent scrub I/Os per vdev
#   Default: 2 | Nordix: 5
options zfs zfs_vdev_scrub_max_active=5


###############################################################################
# PREFETCH – Sequential read-ahead prediction
###############################################################################

# zfs_prefetch_disable – Toggle speculative read-ahead
#
#   Values:   0 = Enabled  | 1 = Disabled
#   Default:  0 (enabled)
#   Nordix:   0
#
#   Dramatically speeds up game loading, video playback, file
#   copies, and application startup. Only disable for purely
#   random I/O workloads (databases).
#
options zfs zfs_prefetch_disable=0


###############################################################################
# I/O AGGREGATION – Merging adjacent small I/Os
###############################################################################

# zfs_vdev_aggregation_limit – Maximum merged I/O size (bytes)
#
#   Default:  1048576 (1 MB)
#   Nordix:   131072 (128 KB)
#
options zfs zfs_vdev_aggregation_limit=131072


# zfs_vdev_read_gap_limit – Maximum gap for read I/O merging (bytes)
#
#   Default:  32768 (32 KB)
#   Nordix:   65536 (64 KB)
#
#   Allows merging reads that are up to this many bytes apart.
#   On NVMe with no seek penalty, more aggressive merging reduces
#   total I/O operations.
#
options zfs zfs_vdev_read_gap_limit=65536


# zfs_vdev_write_gap_limit – Maximum gap for write I/O merging (bytes)
#
#   Default:  4096 (4 KB)
#   Nordix:   16384 (16 KB)
#
#   More aggressive write coalescing during TXG commits.
#
options zfs zfs_vdev_write_gap_limit=16384


###############################################################################
# METASLAB ALLOCATION – SSD-optimized block placement
###############################################################################

# metaslab_lba_weighting_enabled – LBA-based allocation bias
#
#   Values:   0 = Disabled (all addresses equal – correct for SSD/NVMe)
#             1 = Enabled  (prefer lower LBAs – only for HDDs)
#   Default:  1
#   Nordix:   0
#
#   Disabling on SSD/NVMe gives more even wear and less fragmentation.
#
options zfs metaslab_lba_weighting_enabled=0


###############################################################################
# L2ARC – Secondary read cache on a dedicated device (optional)
###############################################################################
#
# L2ARC is optional on 32 GB systems. The 20 GB ARC covers most
# desktop workloads comfortably. Consider L2ARC only if your working
# set significantly exceeds 50 GB (effective compressed ARC).
#
# Uncomment these if using a dedicated L2ARC device:
#
#options zfs l2arc_write_max=268435456
#options zfs l2arc_write_boost=536870912
#options zfs l2arc_headroom=8
#options zfs l2arc_noprefetch=0
#options zfs l2arc_rebuild_enabled=1


